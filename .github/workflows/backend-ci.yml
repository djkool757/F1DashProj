name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'backend.Tests/**'
      - '*.sln'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'backend.Tests/**'
      - '*.sln'
      - '.github/workflows/backend-ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore backend.Tests/Pitwall.Tests.csproj

      - name: Build
        run: dotnet build backend.Tests/Pitwall.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test backend.Tests/Pitwall.Tests.csproj --no-build --configuration Release --verbosity normal
